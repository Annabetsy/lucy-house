<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8fb1">
<title>Lucy's Toca World 🏡</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --pink:#ff8fb1; --pink2:#ff6f9c; --yellow:#ffd966; --blue:#6fc4ff;
    --green:#8ad97a; --purple:#c69bff; --ink:#3a2e4d; }
  html, body { margin:0; height:100%; overflow:hidden;
    font-family:"Comic Sans MS","Baloo 2","Segoe UI",system-ui,sans-serif;
    background:#ffeaf2; color:var(--ink);
    touch-action:manipulation; user-select:none; -webkit-user-select:none; }
  #app { display:flex; flex-direction:column; height:100%; }

  header { display:flex; align-items:center; gap:8px; padding:7px 10px;
    background:linear-gradient(90deg,var(--pink),var(--purple)); color:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.15); z-index:5; }
  header h1 { font-size:18px; margin:0; flex:1; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 2px rgba(0,0,0,.2); }
  .hbtn { border:none; border-radius:14px; padding:7px 10px; font-size:15px;
    background:rgba(255,255,255,.25); color:#fff; font-weight:bold; cursor:pointer; font-family:inherit; }
  .hbtn:active { transform:scale(.93); }

  #floors { display:flex; gap:6px; padding:6px 8px; overflow-x:auto;
    background:#fff5fa; border-bottom:2px solid #ffd6e6; }
  .floor-btn { flex:0 0 auto; border:none; border-radius:14px; padding:7px 11px;
    font-size:14px; font-weight:bold; background:#ffe1ec; color:var(--ink);
    cursor:pointer; font-family:inherit; white-space:nowrap; }
  .floor-btn.active { background:var(--pink2); color:#fff; transform:scale(1.04); }

  #rooms { display:flex; gap:6px; padding:6px 8px; overflow-x:auto;
    background:#fff; border-bottom:2px solid #f0e6ff; }
  .room-tab { flex:0 0 auto; border:none; border-radius:12px; padding:6px 12px;
    font-size:13px; font-weight:bold; background:#f1ecff; color:var(--ink);
    cursor:pointer; font-family:inherit; white-space:nowrap; }
  .room-tab.active { background:var(--purple); color:#fff; }
  .room-tab.add { background:var(--green); color:#fff; }

  #stage-wrap { flex:1; position:relative; overflow:hidden; }
  #stage { position:absolute; inset:0; overflow:hidden; transition:background .25s; }
  #wall { position:absolute; left:0; right:0; top:0; height:62%; }
  #floorEl { position:absolute; left:0; right:0; bottom:0; height:38%;
    box-shadow:inset 0 4px 8px rgba(0,0,0,.08); }
  #baseboard { position:absolute; left:0; right:0; bottom:38%; height:10px;
    background:rgba(0,0,0,.07); }

  .thing { position:absolute; transform:translate(-50%,-50%);
    cursor:grab; touch-action:none; will-change:left,top;
    display:flex; flex-direction:column; align-items:center;
    filter:drop-shadow(0 4px 3px rgba(0,0,0,.18)); transition:transform .08s; }
  .art { display:flex; align-items:center; justify-content:center; }
  .art svg { width:100%; height:100%; display:block; overflow:visible; }
  .thing.lift { transform:translate(-50%,-54%) scale(1.18) rotate(-3deg);
    filter:drop-shadow(0 10px 8px rgba(0,0,0,.3)); z-index:30; }
  .thing.selected { outline:3px dashed var(--pink2); outline-offset:4px; border-radius:14px; }
  .bubble { background:#fff; border:2px solid var(--ink); border-radius:12px;
    padding:3px 8px; font-size:13px; max-width:130px; margin-bottom:4px;
    position:relative; color:var(--ink); text-align:center; }
  .bubble::after { content:""; position:absolute; bottom:-8px; left:50%;
    transform:translateX(-50%); border:6px solid transparent; border-top-color:#fff; }

  .scene { position:absolute; inset:0; pointer-events:none; }

  #actionbar { position:absolute; top:8px; left:50%; transform:translateX(-50%);
    display:none; gap:6px; background:rgba(255,255,255,.96); border:2px solid var(--pink);
    border-radius:16px; padding:6px 8px; box-shadow:0 4px 12px rgba(0,0,0,.2);
    z-index:40; flex-wrap:wrap; justify-content:center; max-width:94%; }
  #actionbar.show { display:flex; }
  .abtn { border:none; border-radius:12px; padding:7px 10px; font-size:14px;
    font-weight:bold; background:#ffe1ec; color:var(--ink); cursor:pointer; font-family:inherit; }
  .abtn.del { background:#ff8a8a; color:#fff; }
  .abtn:active { transform:scale(.92); }

  #drawer { background:#fff; border-top:3px solid var(--pink); box-shadow:0 -3px 10px rgba(0,0,0,.1); }
  #cats { display:flex; gap:5px; padding:6px 8px 0; overflow-x:auto; }
  .cat { flex:0 0 auto; border:none; border-radius:12px 12px 0 0; padding:6px 11px;
    font-size:13px; font-weight:bold; background:#f3f3f7; color:var(--ink);
    cursor:pointer; font-family:inherit; white-space:nowrap; }
  .cat.active { background:var(--yellow); }
  #items { display:flex; gap:8px; padding:8px; overflow-x:auto; background:#fffceb;
    min-height:70px; align-items:center; }
  .item { flex:0 0 auto; cursor:pointer; background:#fff; border-radius:14px; padding:5px;
    box-shadow:0 2px 4px rgba(0,0,0,.12); }
  .item .art { width:48px; height:48px; }
  .item:active { transform:scale(.88); }
  .item.add-person { font-size:14px; font-weight:bold; color:#fff;
    background:var(--purple); padding:14px 12px; }

  #overlay { position:fixed; inset:0; background:rgba(0,0,0,.35);
    display:none; align-items:flex-end; justify-content:center; z-index:50; }
  #overlay.show { display:flex; }
  .sheet { background:#fff; width:100%; max-width:540px; border-radius:22px 22px 0 0;
    padding:16px; box-shadow:0 -4px 20px rgba(0,0,0,.3); max-height:86%; overflow-y:auto; }
  .sheet h2 { margin:2px 0 12px; font-size:19px; }
  .row { margin-bottom:14px; }
  .row label { display:block; font-size:14px; font-weight:bold; margin-bottom:6px; }
  .swatches { display:flex; flex-wrap:wrap; gap:8px; }
  .sw { width:36px; height:36px; border-radius:50%; border:3px solid #fff;
    box-shadow:0 0 0 2px #ddd; cursor:pointer; }
  .sw.sel { box-shadow:0 0 0 3px var(--ink); }
  .opts { display:flex; flex-wrap:wrap; gap:6px; }
  .opt { border:2px solid #eee; background:#faf7ff; border-radius:12px; padding:7px 10px;
    font-size:13px; font-weight:bold; cursor:pointer; font-family:inherit; color:var(--ink); }
  .opt.sel { border-color:var(--purple); background:#efe4ff; }
  .sheet input[type=text] { width:100%; padding:10px; font-size:16px; border:2px solid #ddd;
    border-radius:12px; font-family:inherit; }
  .sheet .big { width:100%; border:none; border-radius:14px; padding:12px; font-size:16px;
    font-weight:bold; background:var(--pink2); color:#fff; cursor:pointer; font-family:inherit; margin-top:6px; }
  .sheet .ghost { background:#eee; color:var(--ink); }
  .placegrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
    gap:10px; margin-bottom:10px; }
  .placecard { border:2px solid #eee; border-radius:16px; padding:12px 6px; text-align:center;
    cursor:pointer; font-weight:bold; font-size:13px; background:#fff; }
  .placecard:active { transform:scale(.94); }
  .placecard .ic { font-size:30px; display:block; margin-bottom:4px; }
  .placecard.active { border-color:var(--pink2); background:#fff0f6; }
  .hint { font-size:12px; color:#998; text-align:center; padding:2px 0 0; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="houseTitle">🏡</h1>
    <button class="hbtn" id="btnHouses">🗺️ Places</button>
    <button class="hbtn" id="btnEdit">🎨 Design</button>
  </header>
  <div id="floors"></div>
  <div id="rooms"></div>
  <div id="stage-wrap">
    <div id="stage">
      <div id="wall"></div>
      <div id="baseboard"></div>
      <div id="floorEl"></div>
      <div id="scene" class="scene"></div>
    </div>
    <div id="actionbar"></div>
  </div>
  <div id="drawer">
    <div id="cats"></div>
    <div id="items"></div>
  </div>
</div>
<div id="overlay"><div class="sheet" id="sheet"></div></div>

}

//////////////////// BUILD ////////////////////
function uid(){ return 'x'+Math.floor(performance.now()*1000%1e9)+Math.floor((window._n=(window._n||0)+1)); }
function layout(keys){
  const things=[]; const n=keys.length;
  keys.forEach((k,i)=>{
    const x = n<=1 ? 50 : 14 + 72*(i/(n-1));
    things.push({ id:uid(), kind:'obj', icon:k, x, y:72+(i%2?7:0), scale:1 });
  });
  return things;
}
function buildPlace(type, name){
  const tpl = BUILDINGS[type];
  return { name: name || tpl.label, type, cur:{f:0,r:0},
    floors: tpl.floors.map(([fname,emoji,rooms]) => ({ name:fname, emoji,
      rooms: rooms.map(([rn,wall,floor,scene,items]) => ({
        id:uid(), name:rn, wall, floor, scene:scene||null, things:layout(items||[]) }))
    }))
  };
}
let DB = load() || { places:[ buildPlace('house',"Lucy's House") ], cur:0 };
let selected = null;

//////////////////// HELPERS ////////////////////
function place(){ return DB.places[DB.cur]; }
function curFloor(){ return place().floors[place().cur.f]; }
function curRoom(){ return curFloor().rooms[place().cur.r]; }
function save(){ try{ localStorage.setItem('lucyToca', JSON.stringify(DB)); }catch(e){} }
function load(){ try{ return JSON.parse(localStorage.getItem('lucyToca')); }catch(e){ return null; } }
function findThing(id){ return curRoom().things.find(t=>t.id===id); }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;'); }
function pick(a){ return a[Math.floor((performance.now()*7 + a.length*3) % a.length)]; }

function makeThing(t){
  const el=document.createElement('div');
  el.className='thing'+(t.id===selected?' selected':'');
  el.style.left=t.x+'%'; el.style.top=t.y+'%'; el.dataset.id=t.id;
  const sc=t.scale||1;
  if(t.kind==='person'){
    let html=''; if(t.say) html+=`<div class="bubble">${escapeHtml(t.say)}</div>`;
    html+=personSVG(t); el.innerHTML=html;
  } else {
    const px=66*sc;
    el.innerHTML=`<div class="art" style="width:${px}px;height:${px}px">${iconSvg(t.icon)}</div>`;
  }
  attachDrag(el,t);
  return el;
}

  else if(style==='pigtails') back=`<circle cx="13" cy="27" r="6" fill="${hc}"/><circle cx="47" cy="27" r="6" fill="${hc}"/>`;
  else if(style==='bun') back=`<circle cx="30" cy="5" r="6" fill="${hc}"/>`;

  else if(style==='spiky') front=`<path d="M15 23 L18 5 L23 18 L27 3 L31 18 L35 3 L39 18 L43 6 L45 23 Z" fill="${hc}"/>`;
  let body;
  if(outfit==='dress'){
    body=`<rect x="11" y="40" width="6" height="18" rx="3" fill="${cl}"/><rect x="43" y="40" width="6" height="18" rx="3" fill="${cl}"/><rect x="25" y="58" width="4" height="20" rx="2" fill="${sk}"/><rect x="31" y="58" width="4" height="20" rx="2" fill="${sk}"/><path d="M19 38 Q19 35 30 35 Q41 35 41 38 L48 64 Q30 70 12 64 Z" fill="${cl}"/>`;

  else if(gl==='sun') glass=`<g fill="#333"><rect x="20" y="22" width="9" height="6" rx="2.5"/><rect x="31" y="22" width="9" height="6" rx="2.5"/><line x1="29" y1="24" x2="31" y2="24" stroke="#333" stroke-width="1.2"/></g>`;
  const eye = gl==='sun' ? '' : `<circle cx="25" cy="25" r="2" fill="#222"/><circle cx="35" cy="25" r="2" fill="#222"/>`;
  let hatSvg='';
  if(hat==='party') hatSvg=`<path d="M22 4 L30 -11 L38 4 Z" fill="#ff6f9c"/><circle cx="30" cy="-11" r="2.6" fill="#ffd966"/><circle cx="27" cy="-1" r="1.4" fill="#fff"/><circle cx="32" cy="-5" r="1.4" fill="#fff"/>`;
  else if(hat==='crown') hatSvg=`<path d="M19 8 L19 -1 L25 5 L30 -3 L35 5 L41 -1 L41 8 Z" fill="#ffd54a" stroke="#e0a92e" stroke-width="1"/><circle cx="30" cy="-1" r="1.5" fill="#ff5a5a"/>`;
  else if(hat==='cap') hatSvg=`<path d="M15 11 Q30 -3 45 11 Z" fill="#6fc4ff"/><path d="M13 11 Q21 9 30 11 L30 14 Q19 14 13 13 Z" fill="#3a9fe0"/>`;
  else if(hat==='bow') hatSvg=`<path d="M27 5 L20 1 L20 11 L27 7 Z" fill="#ff6f9c"/><path d="M33 5 L40 1 L40 11 L33 7 Z" fill="#ff6f9c"/><circle cx="30" cy="6" r="2.6" fill="#ff4f8c"/>`;
  else if(hat==='beanie') hatSvg=`<path d="M14 16 Q14 -1 30 -1 Q46 -1 46 16 Z" fill="#c69bff"/><rect x="13" y="13" width="34" height="5" rx="2.5" fill="#a87fe0"/>`;
  return `<svg class="emoji" viewBox="0 -13 60 100" width="${w}" height="${h}" style="overflow:visible">

//////////////////// DRAG ////////////////////
function attachDrag(el,t){
  let dragging=false, moved=false;
  el.addEventListener('pointerdown', e=>{ e.preventDefault(); dragging=true; moved=false;
    el.setPointerCapture(e.pointerId); el.classList.add('lift'); el.style.cursor='grabbing'; });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const st=document.getElementById('stage').getBoundingClientRect();
    const nx=((e.clientX-st.left)/st.width)*100, ny=((e.clientY-st.top)/st.height)*100;
    if(Math.abs(nx-t.x)>0.6||Math.abs(ny-t.y)>0.6) moved=true;
    t.x=Math.max(3,Math.min(97,nx)); t.y=Math.max(6,Math.min(96,ny));
    el.style.left=t.x+'%'; el.style.top=t.y+'%';
  });
  el.addEventListener('pointerup', ()=>{ dragging=false; el.classList.remove('lift'); el.style.cursor='grab';
    if(!moved) selectThing(t.id); save(); });
}

//////////////////// SELECT + ACTIONS ////////////////////
function selectThing(id){
  selected=(selected===id)?null:id;
  document.querySelectorAll('.thing').forEach(n=>n.classList.toggle('selected', n.dataset.id===selected));
  renderActionBar();
}
function renderActionBar(){
  const bar=document.getElementById('actionbar');
  const t=selected&&findThing(selected);
  if(!t){ bar.className=''; bar.innerHTML=''; return; }
  bar.className='show';
  let html='';
  if(t.kind==='person'){ html+=abtn('👗 Dress Up','dress'); html+=abtn('💬 Talk','talk'); }
  html+=abtn('➕ Bigger','big')+abtn('➖ Smaller','small')+abtn('🗑️ Remove','del',true);
  bar.innerHTML=html;
  bar.querySelectorAll('button').forEach(b=>b.onclick=()=>action(b.dataset.act,t));
}
function abtn(label,act,del){ return `<button class="abtn${del?' del':''}" data-act="${act}">${label}</button>`; }
function action(act,t){
  if(act==='big') t.scale=Math.min(2.6,(t.scale||1)+0.2);
  else if(act==='small') t.scale=Math.max(0.5,(t.scale||1)-0.2);
  else if(act==='del'){ curRoom().things=curRoom().things.filter(x=>x.id!==t.id); selected=null; }
  else if(act==='dress'){ openDress(t); return; }
  else if(act==='talk'){ openTalk(t); return; }
  renderStage(); save();
}

//////////////////// SHEET ////////////////////
function openSheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('overlay').className='show'; }
function closeSheet(){ document.getElementById('overlay').className=''; }
document.getElementById('overlay').onclick=e=>{ if(e.target.id==='overlay') closeSheet(); };
function swatchRow(label,colors,current,attr){
  let s=`<div class="row"><label>${label}</label><div class="swatches">`;
  colors.forEach(c=>s+=`<div class="sw${c===current?' sel':''}" style="background:${c}" data-attr="${attr}" data-val="${c}"></div>`);
  return s+'</div></div>';
}
function optRow(label,options,current,attr){
  let s=`<div class="row"><label>${label}</label><div class="opts">`;
  options.forEach(o=>s+=`<button class="opt${o.val===current?' sel':''}" data-attr="${attr}" data-val="${o.val}">${o.label}</button>`);
  return s+'</div></div>';
}

document.getElementById('btnEdit').onclick=()=>{

  openSheet(`<h2>🎨 Design this room</h2>

  document.querySelectorAll('.sw').forEach(sw=>sw.onclick=()=>{
    r[sw.dataset.attr]=sw.dataset.val;

    sw.classList.add('sel'); renderStage(); save();
  });

    if(curFloor().rooms.length<=1){ alert('Each floor needs at least one room! Add another first. 😊'); return; }

};

function openDress(t){
  openSheet(`<h2>👗 Dress-up Closet</h2>
    <div style="text-align:center;margin:-4px 0 8px">${personSVG({...t,scale:1.5})}</div>
    ${optRow('Hairstyle',HAIRSTYLES.map(v=>({val:v,label:cap(v)})),t.hairStyle||'short','hairStyle')}
    ${swatchRow('Hair color',HAIRS,t.hair,'hair')}
    ${optRow('Hat / Crown',HATS.map(v=>({val:v,label:hatLabel(v)})),t.hat||'none','hat')}
    ${optRow('Glasses',GLASSES.map(v=>({val:v,label:glLabel(v)})),t.glasses||'none','glasses')}
    ${optRow('Outfit',OUTFITS.map(v=>({val:v,label:v==='dress'?'👗 Dress':'👕 Shirt'})),t.outfit||'shirt','outfit')}
    ${swatchRow('Clothes color',CLOTHES,t.clothes,'clothes')}${swatchRow('Skin',SKINS,t.skin,'skin')}
    <button class="big" id="doneDress">✅ Looks great!</button>`);
  const refresh=()=>{ openDress(t); renderStage(); save(); };
  document.querySelectorAll('.sw').forEach(sw=>sw.onclick=()=>{ t[sw.dataset.attr]=sw.dataset.val; refresh(); });
  document.querySelectorAll('.opt').forEach(op=>op.onclick=()=>{ t[op.dataset.attr]=op.dataset.val; refresh(); });
  document.getElementById('doneDress').onclick=()=>{ save(); closeSheet(); };
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function hatLabel(v){ return {none:'None',party:'🥳 Party',crown:'👑 Crown',cap:'🧢 Cap',bow:'🎀 Bow',beanie:'🧶 Beanie'}[v]; }
function glLabel(v){ return {none:'None',round:'👓 Round',sun:'🕶️ Sun'}[v]; }

function openTalk(t){
  openSheet(`<h2>💬 What do they say?</h2>
    <div class="row"><input type="text" id="sayText" maxlength="40" value="${escapeAttr(t.say)}" placeholder="Type something fun..."></div>
    <button class="big" id="saySave">💬 Say it!</button><button class="big ghost" id="sayClear">🤐 No bubble</button>`);
  const inp=document.getElementById('sayText'); inp.focus();
  document.getElementById('saySave').onclick=()=>{ t.say=inp.value; renderStage(); save(); closeSheet(); };
  document.getElementById('sayClear').onclick=()=>{ t.say=''; renderStage(); save(); closeSheet(); };
}

//////////////////// PLACES ////////////////////
document.getElementById('btnHouses').onclick=openPlaces;
function openPlaces(){
  let mine=DB.places.map((p,i)=>`<div class="placecard${i===DB.cur?' active':''}" data-go="${i}"><span class="ic">${BUILDINGS[p.type]?.icon||'🏠'}</span>${escapeHtml(p.name)}</div>`).join('');
  let all=BUILD_ORDER.map(type=>`<div class="placecard" data-new="${type}"><span class="ic">${BUILDINGS[type].icon}</span>${BUILDINGS[type].label}</div>`).join('');
  openSheet(`<h2>🗺️ Your Places</h2><div class="placegrid">${mine}</div>
    <label style="font-weight:bold">➕ Add a new place</label>
    <div class="placegrid" style="margin-top:8px">${all}</div>
    <button class="big ghost" id="renameP">✏️ Rename this place</button>
    ${DB.places.length>1?'<button class="big ghost" id="delP">🗑️ Remove this place</button>':''}`);
  document.querySelectorAll('[data-go]').forEach(c=>c.onclick=()=>{ DB.cur=+c.dataset.go; selected=null; closeSheet(); renderAll(); save(); });
  document.querySelectorAll('[data-new]').forEach(c=>c.onclick=()=>{ DB.places.push(buildPlace(c.dataset.new)); DB.cur=DB.places.length-1; selected=null; closeSheet(); renderAll(); save(); });
  document.getElementById('renameP').onclick=()=>{ const n=prompt('Rename this place:',place().name); if(n){ place().name=n; closeSheet(); renderAll(); save(); } };
  const del=document.getElementById('delP');
  if(del) del.onclick=()=>{ if(!confirm('Remove this place?')) return; DB.places.splice(DB.cur,1); DB.cur=0; selected=null; closeSheet(); renderAll(); save(); };
}

renderAll();
</script>
</body>
</html>
